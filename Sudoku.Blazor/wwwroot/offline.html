<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="A modern, full-featured Sudoku game with multiple difficulty levels" />
    <title>XenobiaSoft Sudoku - Offline</title>
    <base href="/" />
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.0/css/all.min.css" rel="stylesheet" />
    <link href="https://unpkg.com/material-components-web@latest/dist/material-components-web.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <link rel="apple-touch-icon" href="images/icons/apple-touch-icon.png" />
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#1b6ec2" />
    
    <style>
        html, body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            height: 100%;
        }

        body {
            background: #fff;
        }

        .mat-layout-grid {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 1rem;
        }

        .mat-layout-grid-inner {
            width: 100%;
            max-width: 600px;
        }

        .landing-page {
            text-align: center;
            padding: 2rem;
        }

        .game-image-container {
            border-radius: 50%;
            display: inline-block;
            position: relative;
            max-width: 400px;
            width: 100%;
        }

        .game-image-container img {
            border: 1px solid #fff;
            border-radius: 50%;
            display: block;
            width: 100%;
            height: auto;
        }

        .game-image-container:after {
            content: "";
            display: block;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center, rgba(255,255,255,0) 0%,rgba(255,255,255,1) 70%,rgba(255,255,255,1) 100%);
            border-radius: 50%;
            position: absolute;
            top: 0;
            left: 0;
        }

        .offline-message {
            margin-top: 2rem;
            padding: 1.5rem;
            background-color: #f8f9fa;
            border-radius: 8px;
            color: #6c757d;
        }

        .offline-message h2 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
            color: #495057;
        }

        .offline-message p {
            margin-bottom: 0;
            font-size: 1rem;
        }

        .offline-icon {
            font-size: 2rem;
            margin-bottom: 1rem;
            color: #1b6ec2;
        }
    </style>
</head>

<body>
    <div class="mat-layout-grid">
        <div class="mat-layout-grid-inner">
            <div class="landing-page">
                <div class="game-image-container">
                    <img alt="Sudoku" src="/images/sudoku_image.jpg" onerror="this.style.display='none'" />
                </div>
                <div class="offline-message">
                    <div class="offline-icon">
                        <i class="fa-solid fa-wifi-slash"></i>
                    </div>
                    <h2>You're Offline</h2>
                    <p>Please check your internet connection and try again.</p>
                </div>
            </div>
        </div>
    </div>
</body>

</html>

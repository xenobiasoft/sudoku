name: Build and Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AZURE_WEBAPP_NAME: XenobiaSoftSudoku
  AZURE_API_NAME: XenobiasoftSudokuApi
  DOTNET_VERSION: "10.x"

permissions:
  contents: read
  id-token: write
  checks: write
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          dotnet-quality: "ga"

      - name: Cache .NET packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore --verbosity normal

      - name: Publish Web Server
        run: dotnet publish Sudoku.Blazor/Sudoku.Blazor.csproj --configuration Release --output ${{ github.workspace }}/publish-web --no-restore --no-build

      - name: Publish API
        run: dotnet publish Sudoku.Api/Sudoku.Api.csproj --configuration Release --output ${{ github.workspace }}/publish-api --no-restore --no-build

      - name: Upload publish-web artifact
        uses: actions/upload-artifact@v4
        with:
          name: publish-web
          path: ${{ github.workspace }}/publish-web

      - name: Upload publish-api artifact
        uses: actions/upload-artifact@v4
        with:
          name: publish-api
          path: ${{ github.workspace }}/publish-api

  test:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          dotnet-quality: "ga"

      - name: Cache .NET packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore

      - name: Run tests with coverage
        run: dotnet test --configuration Release --no-restore --verbosity normal --logger trx --results-directory TestResults --collect:"XPlat Code Coverage" --settings coverlet.runsettings

      - name: Generate coverage report
        uses: danielpalme/ReportGenerator-GitHub-Action@5
        with:
          reports: TestResults/**/coverage.cobertura.xml
          targetdir: CoverageReport
          reporttypes: HtmlInline;Cobertura;MarkdownSummaryGithub
          verbosity: Warning

      - name: Enforce 80% line coverage threshold
        run: |
          PERCENT=$(awk 'NR==2 && /line-rate/ { match($0, /line-rate="([0-9.]+)"/, a); printf "%.2f", a[1] * 100 }' CoverageReport/Cobertura.xml)
          echo "Line coverage: ${PERCENT}%"
          echo "### Coverage Summary" >> $GITHUB_STEP_SUMMARY
          echo "Line coverage: **${PERCENT}%**" >> $GITHUB_STEP_SUMMARY
          if awk "BEGIN { exit !($PERCENT < 80) }"; then
            echo "❌ Coverage ${PERCENT}% is below the required 80% threshold." | tee -a $GITHUB_STEP_SUMMARY
            exit 1
          else
            echo "✅ Coverage ${PERCENT}% meets the required 80% threshold." | tee -a $GITHUB_STEP_SUMMARY
          fi

      - name: Publish test results as PR annotations
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: .NET Tests
          path: TestResults/*.trx
          reporter: dotnet-trx
          fail-on-error: false

      - name: Upload test-results artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: TestResults

  deploy-infra:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Debug Azure context
        run: |
          az account show --output table
          az account list --output table
          az group show -n rg-xenobiasoft-sudoku-prod-westus2 --output table

      - name: Deploy Bicep template
        id: deploy
        uses: azure/arm-deploy@v2
        with:
          resourceGroupName: rg-xenobiasoft-sudoku-prod-westus2
          template: ./infra/main.bicep
          parameters: ./infra/params/prod.bicepparam
          scope: resourcegroup
          failOnStdErr: true

      - name: Dump deployment error details (if failed)
        if: failure()
        run: |
          echo "Showing deployment operations for 'main'..."
          az deployment operation group list \
            --resource-group rg-xenobiasoft-sudoku-prod-westus2 \
            --name main \
            --output jsonc

          echo "Showing deployment details for 'main'..."
          az deployment group show \
            --resource-group rg-xenobiasoft-sudoku-prod-westus2 \
            --name main \
            --output jsonc

  deploy-apps:
    needs: deploy-infra
    runs-on: ubuntu-latest

    steps:
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Download publish-web artifact
        uses: actions/download-artifact@v4
        with:
          name: publish-web
          path: ${{ github.workspace }}/publish-web

      - name: Download publish-api artifact
        uses: actions/download-artifact@v4
        with:
          name: publish-api
          path: ${{ github.workspace }}/publish-api

      - name: DNS check (scm endpoint)
        run: |
          sudo apt-get update && sudo apt-get install -y dnsutils
          nslookup ${{ env.AZURE_WEBAPP_NAME }}.scm.azurewebsites.net
          nslookup ${{ env.AZURE_API_NAME }}.scm.azurewebsites.net

      - name: Deploy Web
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          package: ${{ github.workspace }}/publish-web

      - name: Deploy API
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_API_NAME }}
          package: ${{ github.workspace }}/publish-api

name: Build and Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AZURE_WEBAPP_NAME: XenobiaSoftSudoku
  AZURE_API_NAME: XenobiasoftSudokuApi
  AZURE_WEBAPP_PACKAGE_PATH: "${{ github.workspace }}/publish-web"
  AZURE_API_PACKAGE_PATH: "${{ github.workspace }}/publish-api"
  DOTNET_VERSION: "10.x"

permissions:
  contents: read
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          dotnet-quality: "ga"

      - name: Cache .NET packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore --verbosity normal

      - name: Test
        run: dotnet test --configuration Release --no-build --verbosity normal --logger trx --results-directory TestResults

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: TestResults/*.trx

      - name: Publish Web Server
        run: dotnet publish Sudoku.Blazor/Sudoku.Blazor.csproj --configuration Release --output ${{ env.AZURE_WEBAPP_PACKAGE_PATH }} --no-restore

      - name: Inject service worker build version
        run: |
          SW_FILE="${{ env.AZURE_WEBAPP_PACKAGE_PATH }}/wwwroot/service-worker.js"

          if [ ! -f "$SW_FILE" ]; then
            echo "ERROR: service-worker.js not found at $SW_FILE"
            ls -la "${{ env.AZURE_WEBAPP_PACKAGE_PATH }}/wwwroot" || true
            exit 1
          fi

          VERSION="${GITHUB_SHA::8}-${GITHUB_RUN_NUMBER}"
          echo "Injecting build version: $VERSION into $SW_FILE"

          sed -i "s/__BUILD_VERSION__/$VERSION/g" "$SW_FILE"

          echo "Verifying token replacement:"
          grep -n "CACHE_VERSION" "$SW_FILE" || true

      - name: Publish API
        run: dotnet publish Sudoku.Api/Sudoku.Api.csproj --configuration Release --output ${{ env.AZURE_API_PACKAGE_PATH }} --no-restore

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ${{ env.AZURE_WEBAPP_PACKAGE_PATH }}

      - name: Deploy to Azure API App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_API_NAME }}
          publish-profile: ${{ secrets.AZURE_API_PUBLISH_PROFILE }}
          package: ${{ env.AZURE_API_PACKAGE_PATH }}

      - name: Deploy Bicep template
        uses: azure/arm-deploy@v2
        with:
          subscriptionId: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          resourceGroupName: rg-xenobiasoft
          template: ./.github/main.bicep
          scope: resourcegroup
          failOnStdErr: false

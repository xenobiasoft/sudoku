name: Build and Deploy

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, closed]
    branches: [main]

env:
  AZURE_WEBAPP_NAME: XenobiaSoftSudoku
  AZURE_API_NAME: XenobiasoftSudokuApi
  AZURE_WEBAPP_PACKAGE_PATH: "${{ github.workspace }}/publish-web"
  AZURE_API_PACKAGE_PATH: "${{ github.workspace }}/publish-api"
  DOTNET_VERSION: "10.x"

permissions:
  contents: read
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          dotnet-quality: "ga"

      - name: Cache .NET packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore --verbosity normal

      - name: Test
        run: dotnet test --configuration Release --no-build --verbosity normal --logger trx --results-directory TestResults

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: TestResults/*.trx

      - name: Publish Web Server
        run: dotnet publish Sudoku.Blazor/Sudoku.Blazor.csproj --configuration Release --output ${{ env.AZURE_WEBAPP_PACKAGE_PATH }} --no-restore

      - name: Publish API
        run: dotnet publish Sudoku.Api/Sudoku.Api.csproj --configuration Release --output ${{ env.AZURE_API_PACKAGE_PATH }} --no-restore

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ${{ env.AZURE_WEBAPP_PACKAGE_PATH }}

      - name: Deploy to Azure API App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_API_NAME }}
          publish-profile: ${{ secrets.AZURE_API_PUBLISH_PROFILE }}
          package: ${{ env.AZURE_API_PACKAGE_PATH }}

      - name: Deploy Bicep template
        uses: azure/arm-deploy@v2
        with:
          subscriptionId: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          resourceGroupName: rg-xenobiasoft
          template: ./.github/main.bicep
          scope: resourcegroup
          failOnStdErr: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: Sudoku.React/package-lock.json

      - name: Install React dependencies
        working-directory: Sudoku.React
        run: npm ci

      - name: Lint React app
        working-directory: Sudoku.React
        run: npm run lint

      - name: Test React app
        working-directory: Sudoku.React
        run: npm test

      - name: Build React app (production)
        if: github.event_name == 'push'
        working-directory: Sudoku.React
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL_PRODUCTION }}
        run: npm run build

      - name: Build React app (PR preview)
        if: github.event_name == 'pull_request' && github.event.action != 'closed'
        working-directory: Sudoku.React
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL_PREVIEW }}
        run: npm run build

      - name: Deploy to Azure Static Web App
        if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APP_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: Sudoku.React
          output_location: dist
          skip_app_build: true

      - name: Close PR staging environment
        if: github.event_name == 'pull_request' && github.event.action == 'closed'
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APP_API_TOKEN }}
          action: close

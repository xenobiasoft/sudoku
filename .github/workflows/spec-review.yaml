name: Spec Review

on:
  pull_request:
    paths:
      - "docs/specs/**"
      - "docs/adr/**"

permissions:
  contents: read
  pull-requests: write

jobs:
  spec-review:
    runs-on: ubuntu-latest
    steps:
      - name: Assign reviewers for spec PR
        uses: actions/github-script@v7
        with:
          script: |
            const reviewers = [
              "architect",
              "documentation-engineer",
              "project-governance",
              "reviewer"
            ];
            await github.rest.pulls.requestReviewers({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              reviewers
            });
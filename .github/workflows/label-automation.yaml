name: Label Automation

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

jobs:
  auto-label:
    permissions:
      contents: read
      pull-requests: read
      issues: write
    runs-on: ubuntu-latest

    steps:
      - name: Get changed files
        id: changes
        uses: tj-actions/changed-files@v44

      - name: Apply labels based on paths
        uses: actions/github-script@v7
        env:
          ALL_CHANGED_FILES: ${{ steps.changes.outputs.all_changed_files }}
        with:
          script: |
            const changed = (process.env.ALL_CHANGED_FILES || "")
              .split("\n")
              .filter(Boolean);
            const labels = new Set();

            if (changed.some(f => f.startsWith("src/backend/"))) labels.add("backend");
            if (changed.some(f => f.startsWith("src/frontend/"))) labels.add("ui-change");
            if (changed.some(f => f.startsWith("infra/"))) labels.add("infra");
            if (changed.some(f => f.startsWith(".github/workflows/"))) labels.add("infra");
            if (changed.some(f => f.startsWith("docs/specs/"))) labels.add("spec-update");
            if (changed.some(f => f.startsWith("docs/adr/"))) labels.add("spec-update");

            const onlyDocs = changed.length > 0 && changed.every(f => f.startsWith("docs/"));
            if (onlyDocs) labels.add("docs-only");

            if (labels.size > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                labels: [...labels],
              });
            }
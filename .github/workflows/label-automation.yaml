on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  auto-label:
    runs-on: ubuntu-latest

    steps:
      - name: Get changed files
        id: changes
        uses: tj-actions/changed-files@v44

      - name: Apply labels based on paths
        uses: actions/github-script@v7
        env:
          ALL_CHANGED_FILES: ${{ steps.changes.outputs.all_changed_files }}
        with:
          script: |
            const changed = (process.env.ALL_CHANGED_FILES || "")
              .split("\n")
              .filter(Boolean);
            const labels = new Set();

            // Backend
            if (changed.some(f => f.startsWith("src/backend/"))) {
              labels.add("backend");
            }

            // Frontend
            if (changed.some(f => f.startsWith("src/frontend/"))) {
              labels.add("ui-change");
            }

            // Infrastructure
            if (changed.some(f => f.startsWith("infra/"))) {
              labels.add("infra");
            }

            // Workflows
            if (changed.some(f => f.startsWith(".github/workflows/"))) {
              labels.add("infra");
            }

            // Specs
            if (changed.some(f => f.startsWith("docs/specs/"))) {
              labels.add("spec-update");
            }

            // ADRs
            if (changed.some(f => f.startsWith("docs/adr/"))) {
              labels.add("spec-update");
            }

            // Docs-only
            const onlyDocs = changed.every(f => f.startsWith("docs/"));
            if (onlyDocs) {
              labels.add("docs-only");
            }

            if (labels.size > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                labels: Array.from(labels)
              });
            }
